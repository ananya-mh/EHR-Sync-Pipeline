version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: ehr-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ehr_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  # Producer service (sends messages to Kafka)
  producer:
    build: .
    container_name: ehr-producer
    depends_on:
      - kafka
    volumes:
      - .:/app
    working_dir: /app
    command: python -u app/producer.py
    restart: on-failure

  # Consumer service (reads from Kafka -> processes -> writes to Postgres)
  consumer:
    build: .
    container_name: ehr-consumer
    depends_on:
      - kafka
      - postgres
    volumes:
      - .:/app
    working_dir: /app
    command: python -u app/main.py
    restart: on-failure

volumes:
  pgdata:
