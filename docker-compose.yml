version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: ehr-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ehr_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Producer services (send messages to Kafka)
  producer-patient:
    build: .
    container_name: ehr-producer-patient
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      EHR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: python -u -m src.producers.patient_data
    restart: on-failure

  producer-labs:
    build: .
    container_name: ehr-producer-labs
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      EHR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: python -u -m src.producers.lab_results_data
    restart: on-failure

  producer-meds:
    build: .
    container_name: ehr-producer-meds
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      EHR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: python -u -m src.producers.medications_data
    restart: on-failure

  # Consumer + API service (reads from Kafka -> processes -> writes to Postgres + serves GraphQL)
  consumer:
    build: .
    container_name: ehr-consumer
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      EHR_DB_HOST: postgres
      EHR_DB_PORT: 5432
      EHR_DB_NAME: ehr_db
      EHR_DB_USER: postgres
      EHR_DB_PASSWORD: password
      EHR_DB_POOL_MIN_SIZE: 2
      EHR_DB_POOL_MAX_SIZE: 10
      EHR_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EHR_LOG_LEVEL: INFO
      EHR_LOG_FORMAT: json
      EHR_API_HOST: 0.0.0.0
      EHR_API_PORT: 8000
    command: python -m src.main
    restart: on-failure

volumes:
  pgdata:
