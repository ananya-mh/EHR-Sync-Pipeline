# Alembic Configuration File

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Timezone to use when rendering the date within the migration file
# as well as the filename. If specified, requires the python>=3.9
# or backports.zoneinfo library.
# timezone =

# Max length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to true to search source files recursively in each "version locations"
# directory.
# recursive_version_locations = false

# The output encoding used when revision files are written from script.py.mako.
# output_encoding = utf-8

# SQLAlchemy connection string.
# Override with EHR_DATABASE_URL environment variable in env.py.
sqlalchemy.url = postgresql://postgres:password@postgres:5432/ehr_db

[post_write_hooks]
# Uncomment to run black on newly generated migration scripts.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
